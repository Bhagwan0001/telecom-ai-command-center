version: '3.9'

services:
  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: taicc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: taicc
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis ---
  redis:
    image: redis:7-alpine
    container_name: taicc-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Backend API ---
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    container_name: taicc-server
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/taicc
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # --- Frontend ---
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: taicc-web
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
